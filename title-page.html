<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WELCOME TO THE SHE CODES : THE TECH MAZE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #000 60%, #b30000);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
      border: 2px solid red;
      background-color: rgba(0, 0, 0, 0.85);
      box-shadow: 0 0 20px red;
      animation: fadeIn 1.5s ease-in;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #ff1a1a;
    }

    h2 {
      font-weight: 300;
      margin-bottom: 30px;
      color: #fff;
    }

    p {
      margin-bottom: 40px;
      color: #ddd;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 15px 30px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 30px;
      transition: all 0.3s ease;
    }

    .start-btn {
      background-color: red;
      color: white;
    }

    .start-btn:hover {
      background-color: white;
      color: red;
      transform: scale(1.05);
    }

    .info-btn {
      background-color: transparent;
      color: white;
      border: 2px solid white;
    }

    .info-btn:hover {
      background-color: white;
      color: black;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>CODE: RED</h1>
    <h2>She Codes :The Tech Maze !</h2>
    <p>
      Welcome to a maze built on logic, creativity, and courage.  
      Navigate the paths. Solve the challenges. Prove your power in tech.
    </p>

    <div class="buttons">
      <button class="start-btn" onclick="startGame()">Start Challenge</button>
      <button class="info-btn" onclick="showInfo()">How It Works</button>
    </div>
  </div>

  <script>
    function startGame() {
      alert("Let the challenge begin! 🚀\n(Connect this to your maze page next)");
      // window.location.href = "maze.html";
    }

    function showInfo() {
      alert(
        "🧩 HOW IT WORKS:\n\n" +
        "• Solve challenges to escape the maze\n" +
        "• Use logic, creativity, and teamwork\n" +
        "• No prior coding experience required\n\n" +
        "Good luck!"
      );
    }
  </script>

</body>
</html>
